 <!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四级英语学习主页</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#d9f0d9,#a8e6a3);
    color:#2c3e2f;
}
header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    text-align:center;
}
nav{
    display:flex;
    justify-content: space-around;
    background:#4caf50;
    color:white;
    padding:10px 0;
}
nav button{
    background: none;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}
nav button:hover{
    text-decoration: underline;
}
section{
    display:none;
    padding:20px;
}
section.active{
    display:block;
}
.card{
    background:#ffffffcc;
    border-radius:20px;
    padding:20px;
    margin:20px auto;
    max-width:400px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}
input{
    padding:10px;
    border-radius:15px;
    border:1px solid #b7e0b7;
    width:70%;
    outline:none;
}
button.action{
    padding:10px 15px;
    margin:10px;
    border:none;
    border-radius:15px;
    background:#4caf50;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
button.action:hover{
    background:#388e3c;
}
ul{
    text-align:left;
    margin-top:15px;
}
.reward{
    font-weight:bold;
    color:#2e7d32;
    margin-top:10px;
}
</style>
</head>
<body>

<header>🌿 四级英语学习主页</header>

<nav>
    <button onclick="showSection('home')">首页提醒</button>
    <button onclick="showSection('records')">学习记录</button>
    <button onclick="showSection('rewards')">奖励兑换</button>
</nav>

<!-- 首页 -->
<section id="home" class="active">
    <div class="card">
        <h3>今日打卡提醒</h3>
        <p id="dailyRemind">还没打卡哦，快学习新单词吧！</p>
        <input type="text" id="wordInput" placeholder="输入单词">
        <button class="action" onclick="addWord()">打卡</button>
    </div>
</section>

<!-- 学习记录 -->
<section id="records">
    <div class="card">
        <h3>学习记录</h3>
        <ul id="wordList"></ul>
        <p>连续打卡天数：<span id="streak">0</span></p>
    </div>
</section>

<!-- 奖励兑换 -->
<section id="rewards">
    <div class="card">
        <h3>奖励兑换</h3>
        <p>连续打卡3天：🧋 一杯奶茶</p>
        <p>连续打卡5天：🍴 一顿大餐</p>
        <p>连续打卡7天：🎬 一场电影</p>
        <button class="action" onclick="redeemReward()">兑换奖励</button>
        <p class="reward" id="rewardMsg"></p>
    </div>
</section>

<script>
// 本地存储
let wordList = JSON.parse(localStorage.getItem("wordList"))||[];
let streakList = JSON.parse(localStorage.getItem("streakList"))||[];

// ---------------- 切换模块
function showSection(id){
    document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ---------------- 打卡功能
function addWord(){
    let word=document.getElementById("wordInput").value.trim();
    if(word==="") return;
    let today=new Date().toISOString().split("T")[0];
    if(streakList.length===0||streakList[streakList.length-1].date!==today){
        streakList.push({date:today});
    }
    localStorage.setItem("streakList",JSON.stringify(streakList));
    wordList.push(word);
    localStorage.setItem("wordList",JSON.stringify(wordList));
    document.getElementById("wordInput").value="";
    renderList();
    updateStreak();
    document.getElementById("dailyRemind").innerText="今日已打卡 ✅";
}

// ---------------- 渲染列表
function renderList(){
    let listEl=document.getElementById("wordList");
    listEl.innerHTML="";
    wordList.forEach((w,i)=>{
        let li=document.createElement("li");
        li.textContent=(i+1)+". "+w;
        listEl.appendChild(li);
    });
}

// ---------------- 更新连续天数
function updateStreak(){
    document.getElementById("streak").innerText=streakList.length;
}

// ---------------- 奖励兑换
function redeemReward(){
    let days=streakList.length;
    let msg="";
    if(days>=7) msg="🎬 恭喜！兑换电影一场！";
    else if(days>=5) msg="🍴 恭喜！兑换大餐！";
    else if(days>=3) msg="🧋 恭喜！兑换奶茶一杯！";
    else msg="连续打卡天数不足，继续努力！";
    document.getElementById("rewardMsg").innerText=msg;
}

// 初始化页面
renderList();
updateStreak();
</script>

</body>
</html>
