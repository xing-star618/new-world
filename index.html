   <!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习打卡管理</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#d9f0d9,#a8e6a3);
    color:#2c3e2f;
}
header {
    padding:20px;
    font-size:26px;
    font-weight:bold;
    text-align:center;
}
.nav {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:10px;
}
.nav button {
    padding:10px 15px;
    border:none;
    border-radius:15px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}
.nav button:hover{background:#388e3c;}
.section{display:none;padding:20px;max-width:600px;margin:auto;}
.card{
    background:#ffffffcc;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input, select{
    padding:8px;
    border-radius:10px;
    border:1px solid #b7e0b7;
    width:70%;
    margin:5px 0;
}
button.action{
    margin-top:10px;
}
table{
    width:100%;
    border-collapse: collapse;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ccc;
    text-align:center;
}
.reward-btn{
    padding:8px 12px;
    margin:5px;
    border:none;
    border-radius:12px;
    background:#388e3c;
    color:white;
    cursor:pointer;
}
.reward-btn:hover{background:#2e7d32;}
</style>
</head>
<body>

<header>🌿 学习打卡管理系统</header>

<div class="nav">
    <button onclick="showSection('home')">首页提醒</button>
    <button onclick="showSection('records')">学习记录</button>
    <button onclick="showSection('rewards')">奖励兑换</button>
    <button onclick="showSection('exercise')">做题打卡</button>
</div>

<!-- 首页提醒 -->
<div id="home" class="section">
    <div class="card">
        <h3>📢 今日打卡提醒</h3>
        <p>记得完成今天的单词学习和题目练习！</p>
        <p id="today-date"></p>
    </div>
</div>

<!-- 学习记录 -->
<div id="records" class="section">
    <div class="card">
        <h3>📚 学习记录</h3>
        <ul id="wordLog"></ul>
        <ul id="exerciseLog"></ul>
    </div>
</div>

<!-- 奖励兑换 -->
<div id="rewards" class="section">
    <div class="card">
        <h3>🏆 奖励兑换</h3>
        <p>连续打卡奖励：</p>
        <ul>
            <li>3天：一杯奶茶</li>
            <li>5天：一顿大餐</li>
            <li>7天：电影票</li>
        </ul>
        <div id="rewardMsg"></div>
        <button class="reward-btn" onclick="redeemReward()">兑换奖励</button>
    </div>
</div>

<!-- 做题打卡 -->
<div id="exercise" class="section">
    <div class="card">
        <h3>📝 今日做题打卡</h3>
        <input type="text" id="exerciseName" placeholder="输入题型，例如：阅读理解">
        <input type="number" id="correctRate" placeholder="正确率（%）">
        <button class="action" onclick="addExercise()">打卡</button>
        <table>
            <thead>
                <tr><th>题型</th><th>正确率</th><th>日期</th></tr>
            </thead>
            <tbody id="exerciseTable"></tbody>
        </table>
    </div>
</div>

<script>
// ---------------- 初始化日期
document.getElementById('today-date').innerText = new Date().toLocaleDateString();

// ---------------- 显示不同页面
function showSection(id){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='block';
}
showSection('home');

// ---------------- 本地存储
let wordList = JSON.parse(localStorage.getItem("wordList")) || [];
let streakList = JSON.parse(localStorage.getItem("streakList")) || [];
let exerciseList = JSON.parse(localStorage.getItem("exerciseList")) || [];

// ---------------- 打卡练习
function addExercise(){
    let name = document.getElementById('exerciseName').value.trim();
    let rate = document.getElementById('correctRate').value.trim();
    if(!name||!rate) return;
    let today = new Date().toLocaleDateString();
    exerciseList.push({name:name, rate:rate, date:today});
    localStorage.setItem('exerciseList', JSON.stringify(exerciseList));
    renderExercise();
    document.getElementById('exerciseName').value='';
    document.getElementById('correctRate').value='';
}

// ---------------- 渲染做题表格
function renderExercise(){
    let tbody = document.getElementById('exerciseTable');
    tbody.innerHTML='';
    exerciseList.forEach(e=>{
        let tr=document.createElement('tr');
        tr.innerHTML=`<td>${e.name}</td><td>${e.rate}%</td><td>${e.date}</td>`;
        tbody.appendChild(tr);
    });
}

// ---------------- 奖励兑换
function redeemReward(){
    let days = streakList.length;
    let msg='';
    if(days>=7) msg='🎁 兑换成功：电影票！';
    else if(days>=5) msg='🍴 兑换成功：大餐！';
    else if(days>=3) msg='🧋 兑换成功：奶茶！';
    else msg='还未达到兑换条件';
    document.getElementById('rewardMsg').innerText=msg;
}

// ---------------- 初始化记录
function renderLogs(){
    let wordLog = document.getElementById('wordLog');
    wordLog.innerHTML='<b>单词打卡：</b>';
    if(wordList.length===0) wordLog.innerHTML+='暂无';
    else wordList.forEach(w=>{let li=document.createElement('li');li.innerText=w;wordLog.appendChild(li);});
}
function renderAll(){
    renderLogs();
    renderExercise();
}
renderAll();
</script>

</body>
</html>
