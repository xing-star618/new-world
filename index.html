<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>疯狂星期四 · V我50 ｜ 肯德基式许愿池</title>
    <!-- 使用 Google Font 提升现代感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖拽影响体验，不影响文字选中 */
        }

        body {
            background: linear-gradient(145deg, #ff7b2c 0%, #ff3a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 装饰粒子背景（动态炸鸡油花） */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(255,215,140,0.2) 2%, transparent 2.5%),
                              radial-gradient(circle at 80% 70%, rgba(255,230,160,0.25) 1.8%, transparent 2.2%);
            background-size: 55px 55px, 70px 70px;
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 560px;
            width: 100%;
            background: rgba(255, 248, 225, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 72px 72px 80px 80px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,215,130,0.6) inset, 0 -8px 0 rgba(0,0,0,0.05) inset;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* 顶部肯德基风格条纹 */
        .kfc-strip {
            background: #e11b1b;
            height: 14px;
            background: repeating-linear-gradient(45deg, #f9b81b, #f9b81b 20px, #e11b1b 20px, #e11b1b 40px);
        }

        /* 头部内容 */
        .hero {
            text-align: center;
            padding: 2rem 1.5rem 1rem;
            background: linear-gradient(135deg, #fff5e6 0%, #ffefdb 100%);
            border-bottom: 3px dashed #ffb347;
        }

        .icon-bucket {
            font-size: 4.2rem;
            filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.2));
            display: inline-block;
            animation: wiggle 3s infinite ease;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg) scale(1.02); }
            75% { transform: rotate(-6deg) scale(0.98); }
        }

        h1 {
            font-size: 3.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c7421a, #ff8c42, #f2b23b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin: 0.2rem 0 0.2rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tagline {
            background: #fff0c4;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #b6450b;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        /* 50 元巨物展示区 */
        .fifty-area {
            background: radial-gradient(ellipse at 30% 40%, #fff3e0, #ffe1b3);
            margin: 1rem 1rem 0 1rem;
            border-radius: 60px;
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,240,0.8);
        }

        .fifty-number {
            font-size: 5.2rem;
            font-weight: 900;
            background: linear-gradient(145deg, #1f8a4c, #2bbd6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.1);
            letter-spacing: 6px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .fifty-number i {
            font-size: 4rem;
            background: none;
            -webkit-background-clip: unset;
            color: #f2b81e;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .fifty-sub {
            font-size: 1rem;
            background: #fdebb3;
            width: fit-content;
            margin: 0.5rem auto 0;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #a54212;
            font-weight: 600;
        }

        /* 倒计时模块 */
        .countdown-box {
            background: #2d2a24;
            margin: 1.2rem 1.2rem 0;
            border-radius: 48px;
            padding: 1rem 0.8rem;
            color: #ffeaac;
            box-shadow: inset 0 1px 4px rgba(255,215,130,0.3), 0 10px 20px rgba(0,0,0,0.2);
        }
        .cd-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .cd-timer {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .cd-unit {
            background: #1e1b17;
            border-radius: 40px;
            min-width: 70px;
            padding: 8px 0;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(255,215,130,0.2), 0 4px 8px black;
        }
        .cd-number {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffeecc, #ffd98c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .cd-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #d6bc84;
        }

        /* 互动计数器 + 按钮 */
        .interaction {
            padding: 1.5rem 1.8rem 2rem;
            text-align: center;
        }
        .v-stats {
            background: #ffffffdb;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0.6rem 1rem;
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: baseline;
            gap: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
            border: 1px solid #ffcd94;
        }
        .stats-number {
            font-size: 2.8rem;
            font-weight: 800;
            color: #d6420a;
            line-height: 1;
        }
        .stats-text {
            font-weight: 600;
            color: #5e2e12;
        }

        .v-button {
            background: linear-gradient(120deg, #ff9500, #ff5719);
            border: none;
            width: 85%;
            max-width: 280px;
            padding: 1.2rem 0.8rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-radius: 100px;
            cursor: pointer;
            transition: 0.2s all;
            box-shadow: 0 12px 0 #9b2e0c, 0 6px 20px rgba(0,0,0,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 2px;
        }
        .v-button:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #9b2e0c;
        }
        .v-button i {
            font-size: 1.8rem;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
        }

        /* 随机toast提示 */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e1a16e6;
            backdrop-filter: blur(18px);
            color: #ffebc2;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            z-index: 200;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border-left: 6px solid #ffb347;
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* 漂浮 +50 金币效果 */
        .float-gold {
            position: fixed;
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(145deg, #ffd966, #ffbc3c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 2px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 999;
            animation: floatUp 0.9s ease-out forwards;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.6);
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.2);
            }
        }

        /* 免责声明 */
        .footer-note {
            background: #ffecce;
            text-align: center;
            padding: 0.9rem;
            font-size: 0.7rem;
            color: #b45a2b;
            border-top: 1px solid #ffd294;
            font-weight: 500;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .card {
                border-radius: 48px;
            }
            h1 { font-size: 2.6rem; }
            .fifty-number { font-size: 3.8rem; }
            .v-button { font-size: 1.4rem; padding: 1rem; width: 90%; }
            .cd-unit { min-width: 58px; }
            .cd-number { font-size: 1.5rem; }
            .stats-number { font-size: 2rem; }
            .toast-message { font-size: 0.8rem; white-space: normal; width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="kfc-strip"></div>
    
    <div class="hero">
        <div class="icon-bucket">
            🍗🍟🥤
        </div>
        <h1>V我50</h1>
        <div class="tagline">
            <i class="fas fa-drumstick-bite"></i> 疯狂星期四 · 慈悲鸡腿饭 <i class="fas fa-burger"></i>
        </div>
    </div>
    
    <div class="fifty-area">
        <div class="fifty-number">
            <i class="fas fa-coins"></i> 50 <i class="fas fa-yen-sign"></i>
        </div>
        <div class="fifty-sub">🍔 黄金脆皮鸡力量 · 直击灵魂 🍟</div>
    </div>
    
    <!-- 倒计时距离下一个疯狂星期四 -->
    <div class="countdown-box">
        <div class="cd-title">
            <i class="far fa-clock"></i> 距离下次疯狂星期四 <i class="fas fa-chicken"></i>
        </div>
        <div class="cd-timer" id="countdownTimer">
            <div class="cd-unit"><div class="cd-number" id="cdDays">00</div><div class="cd-label">天</div></div>
            <div class="cd-unit"><div class="cd-number" id="cdHours">00</div><div class="cd-label">时</div></div>
            <div class="cd-unit"><div class="cd-number" id="cdMinutes">00</div><div class="cd-label">分</div></div>
            <div class="cd-unit"><div class="cd-number" id="cdSeconds">00</div><div class="cd-label">秒</div></div>
        </div>
        <div style="font-size: 0.7rem; text-align: center; margin-top: 8px; opacity:0.8;"><i class="fas fa-hand-holding-usd"></i> 届时 V50 功德加倍！</div>
    </div>
    
    <div class="interaction">
        <div class="v-stats">
            <span class="stats-number" id="patronCount">198</span>
            <span class="stats-text">位好心人已经 <i class="fas fa-heart" style="color:#ff6347;"></i> V我50</span>
        </div>
        <button class="v-button" id="vmeBtn">
            <i class="fab fa-alipay"></i> 立刻V我50 <i class="fas fa-hand-peace"></i>
        </button>
        <p style="margin-top: 18px; font-size: 0.7rem; opacity:0.7; color:#a14615;">
            <i class="fas fa-laugh-squint"></i> 点一下积功德 · 虚拟转账 纯属KFC玄学
        </p>
    </div>
    <div class="footer-note">
        🧧 纯娱乐互动 | 疯狂星期四文学创作 | 没有人真的损失50元 😜 开心就好！
    </div>
</div>

<script>
    (function() {
        // ---------- 疯狂星期四倒计时逻辑 (下一个周四 00:00:00) ----------
        function getNextThursday() {
            const now = new Date();
            const currentDay = now.getDay();     // 0周日 .. 6周六
            let daysToThursday;
            if (currentDay === 4) {
                // 今天周四，但若已经过了0点，就显示下个周四? 通常疯狂星期四文案是当天就要V50，但倒计时显示距离下个周四还有7天不太对，
                // 为了让体验更好: 如果当前时间在周四 00:00 - 23:59:59之内，应该显示"今天就是疯狂星期四！"
                // 但倒计时部分我们依然计算下一个周四若今天已经过了0点但还没过周四全天？ 根据惯例做成:
                // 如果当前是周四，距离这个周四结束时间(到23:59:59)作为倒计时？更有紧迫感 
                // 更好体验：如果是周四，显示 距离本周疯狂星期四结束还有 xx:xx:xx，加强“快V我”氛围。
                // 否则显示距离下个周四开启时间。
                if (now.getHours() >= 0) {
                    // 周四当天，距离本周四结束倒计时
                    const nextThuEnd = new Date(now);
                    nextThuEnd.setDate(now.getDate());
                    nextThuEnd.setHours(23, 59, 59, 999);
                    if (nextThuEnd > now) {
                        return { target: nextThuEnd, isToday: true };
                    } else {
                        // 如果超过了 23:59:59 理论上不会发生，但保险取下周四
                        const nextWeek = new Date(now);
                        nextWeek.setDate(now.getDate() + ((4 + 7 - currentDay) % 7 || 7));
                        nextWeek.setHours(0, 0, 0, 0);
                        return { target: nextWeek, isToday: false };
                    }
                }
            } else {
                // 不是周四，计算下一个周四
                let days = (4 - currentDay + 7) % 7;
                if (days === 0) days = 7;  // 理论上不会为0
                const nextThu = new Date(now);
                nextThu.setDate(now.getDate() + days);
                nextThu.setHours(0, 0, 0, 0);
                return { target: nextThu, isToday: false };
            }
            // fallback 补偿逻辑
            const nextThursday = new Date(now);
            nextThursday.setDate(now.getDate() + ((4 - currentDay + 7) % 7 || 7));
            nextThursday.setHours(0, 0, 0, 0);
            return { target: nextThursday, isToday: false };
        }

        function updateCountdown() {
            const now = new Date();
            let targetInfo = getNextThursday();
            let target = targetInfo.target;
            let diff = target - now;

            // 特殊情况如果今天是周四并且我们取的是结束时间，也需要特殊展示文案
            const isCurrentlyThursday = (new Date().getDay() === 4);
            
            if (diff <= 0) {
                // 倒计时归零，重新刷新下一次倒计时（防止显示负值）
                if (isCurrentlyThursday && targetInfo.isToday === true && diff < 0) {
                    // 已经过了周四结束，重新获取下个周四
                    const next = getNextThursday();
                    target = next.target;
                    diff = target - now;
                } else if (!isCurrentlyThursday && diff <= 0) {
                    // 跨过了周四重新获取
                    const next = getNextThursday();
                    target = next.target;
                    diff = target - now;
                }
            }

            if (diff <= 0) {
                // 强制刷新防止出错
                document.getElementById("cdDays").innerText = "00";
                document.getElementById("cdHours").innerText = "00";
                document.getElementById("cdMinutes").innerText = "00";
                document.getElementById("cdSeconds").innerText = "00";
                return;
            }

            const seconds = Math.floor(diff / 1000);
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            document.getElementById("cdDays").innerText = days < 10 ? "0" + days : days;
            document.getElementById("cdHours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("cdMinutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("cdSeconds").innerText = secs < 10 ? "0" + secs : secs;
            
            // 附加趣味文案: 如果今天就是周四，倒计时区域可以加一句buff
            const cdTitleDiv = document.querySelector(".cd-title");
            if (isCurrentlyThursday && targetInfo.isToday === true) {
                if (cdTitleDiv && !cdTitleDiv.querySelector('.today-badge')) {
                    const badgeSpan = document.createElement('span');
                    badgeSpan.className = 'today-badge';
                    badgeSpan.innerHTML = '🔥 就是今天！立刻V我50 🔥';
                    badgeSpan.style.marginLeft = '8px';
                    badgeSpan.style.background = '#ff7e33';
                    badgeSpan.style.padding = '0 8px';
                    badgeSpan.style.borderRadius = '30px';
                    badgeSpan.style.fontSize = '0.7rem';
                    if (!cdTitleDiv.querySelector('.today-badge')) cdTitleDiv.appendChild(badgeSpan);
                }
            } else {
                const exist = cdTitleDiv.querySelector('.today-badge');
                if(exist) exist.remove();
            }
        }
        
        // 每秒刷新倒计时
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        // ------------------ 互动部分 ------------------
        let patronTotal = 198;   // 初始已经有198位虚拟老板 (氛围组)
        const patronCountSpan = document.getElementById("patronCount");
        const vBtn = document.getElementById("vmeBtn");
        
        // 风趣的感谢语库
        const thanksMessages = [
            "🍗 老板大气！今晚加鸡腿！ 🍗",
            "💸 谢谢老板V我50！疯狂星期四起飞 💸",
            "😭 好人一生平安！KFC永远记得您！ 😭",
            "✨ 老板一夜暴富！功德+50 ✨",
            "🐔 疯狂星期四因你而神圣！ 🐔",
            "🍟 您的50让我吃到了脆皮鸡！感谢！ 🍟",
            "🎉 老板发大财！黄金鸡块送祝福 🎉",
            "🥤 V50成功！老板万事顺遂！ 🥤"
        ];
        
        // 随机获取感谢语
        function getRandomThanks() {
            return thanksMessages[Math.floor(Math.random() * thanksMessages.length)];
        }
        
        // 显示浮动弹窗toast
        let activeToast = null;
        function showToast(message) {
            if (activeToast) {
                activeToast.classList.remove('show');
                setTimeout(() => {
                    if(activeToast) activeToast.remove();
                    createNewToast(message);
                }, 50);
            } else {
                createNewToast(message);
            }
        }
        
        function createNewToast(msg) {
            const toastDiv = document.createElement('div');
            toastDiv.className = 'toast-message';
            toastDiv.innerHTML = `<i class="fas fa-hand-holding-heart"></i> ${msg}`;
            document.body.appendChild(toastDiv);
            activeToast = toastDiv;
            setTimeout(() => {
                toastDiv.classList.add('show');
            }, 10);
            setTimeout(() => {
                toastDiv.classList.remove('show');
                setTimeout(() => {
                    if (toastDiv.parentNode) toastDiv.remove();
                    if (activeToast === toastDiv) activeToast = null;
                }, 300);
            }, 2500);
        }
        
        // 创建漂浮 +50 金币特效 (基于点击位置)
        function createFloatGold(x, y) {
            const goldDiv = document.createElement('div');
            goldDiv.className = 'float-gold';
            goldDiv.innerHTML = '+50 🧧';
            goldDiv.style.left = (x - 30) + 'px';
            goldDiv.style.top = (y - 20) + 'px';
            document.body.appendChild(goldDiv);
            // 随机偏移左右一些飘动轨迹更有感觉
            const randomXOffset = (Math.random() - 0.5) * 40;
            goldDiv.style.setProperty('--x-offset', randomXOffset + 'px');
            goldDiv.style.animation = 'floatUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards';
            setTimeout(() => {
                if(goldDiv && goldDiv.parentNode) goldDiv.remove();
            }, 1000);
        }
        
        // 更新计数器
        function updatePatronCount(increment = true) {
            if (increment) {
                patronTotal++;
                patronCountSpan.innerText = patronTotal;
                // 添加一个简单的跳动效果
                patronCountSpan.style.transform = 'scale(1.2)';
                setTimeout(() => { if(patronCountSpan) patronCountSpan.style.transform = 'scale(1)'; }, 150);
            } else {
                patronCountSpan.innerText = patronTotal;
            }
        }
        
        // 处理按钮点击交互
        function handleV50(event) {
            // 获取点击坐标用于漂浮金币
            let clientX, clientY;
            if (event.touches) {
                // 移动端触摸
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            // 保证点击位置有效，如果没有坐标则基于按钮中心
            if (!clientX || !clientY) {
                const rect = vBtn.getBoundingClientRect();
                clientX = rect.left + rect.width / 2;
                clientY = rect.top + rect.height / 2;
            }
            
            // 产生漂浮金币效果，可产生2-3个让气氛更热烈
            createFloatGold(clientX, clientY);
            setTimeout(() => {
                if (Math.random() > 0.6) {
                    // 有时候额外飘一个，更欢乐
                    createFloatGold(clientX + (Math.random() - 0.5) * 30, clientY - 10);
                }
            }, 50);
            
            // 更新计数器
            updatePatronCount(true);
            
            // 随机感谢语并展示toast
            const thankMsg = getRandomThanks();
            showToast(thankMsg);
            
            // 额外添加按钮震动一下效果
            vBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { vBtn.style.transform = ''; }, 100);
            
            // 控制台彩蛋输出 (纯娱乐)
            console.log("%c 🍔 感谢施主V我50！功德无量 🍟", "color: #ff8811; font-size: 16px; font-weight: bold;");
        }
        
        // 绑定点击事件 (支持PC + 移动端)
        vBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleV50(e);
        });
        vBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleV50(e);
        });
        
        // 额外的彩蛋：如果用户疯狂点击过多次，每隔几次显示不同提示（无额外限制，都是欢乐）
        let clickCountCache = 0;
        const originalHandler = handleV50;
        window.handleV50Extra = function(e) {
            clickCountCache++;
            if (clickCountCache % 10 === 0) {
                showToast("🤣 老板今天特别想V50？ 爱您！ 🤣");
            }
            originalHandler(e);
        };
        // 替换一下增加彩蛋但保留原有效果不冲突
        vBtn.removeEventListener('click', handleV50);
        vBtn.removeEventListener('touchstart', handleV50);
        const newHandler = (e) => {
            e.preventDefault();
            clickCountCache++;
            if (clickCountCache % 10 === 0 && clickCountCache > 0) {
                showToast("🤣 老板今天特别想V50？ 爱您！ 🤣");
            }
            handleV50(e);
        };
        vBtn.addEventListener('click', newHandler);
        vBtn.addEventListener('touchstart', newHandler);
        
        // 预热初始化（可显示欢迎toast？没必要但有趣，不打扰）
        setTimeout(() => {
            // 如果进入页面是周四，显示一条额外问候
            const nowDate = new Date();
            if (nowDate.getDay() === 4) {
                showToast("🐔 今天就是疯狂星期四！老板V我50吧～ 🐔");
            } else {
                // 偶尔随机一个趣味文案
                if(Math.random() > 0.7) setTimeout(() => showToast("🍟 点击按钮，施舍作者一个炸鸡腿梦！🍟"), 800);
            }
        }, 500);
        
        // 保证手机触摸不会有页面缩放影响体验 (已设置meta)
        // 动态调整可能存在的样式问题
        function adjustMobileScreen() {
            const vw = window.innerWidth;
            if (vw < 380) {
                document.querySelector('.fifty-number').style.fontSize = '3rem';
            } else {
                document.querySelector('.fifty-number').style.fontSize = '';
            }
        }
        window.addEventListener('resize', adjustMobileScreen);
        adjustMobileScreen();
    })();
</script>
</body>
</html>
